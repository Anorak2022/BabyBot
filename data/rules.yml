version: "3.1"

rules:
  - rule: Regla de bienvenida
    steps:
      - intent: bienvenida
      - action: utter_bienvenida

  - rule: Regla de adios
    steps:
      - intent: adios
      - action: utter_adios

  - rule: Regla de pregunta sobre otro tema
    steps:
      - intent: preguntar_otro_tema
      - action: utter_preguntar_otro_tema

  - rule: Responder preguntas generales sobre embarazo
    steps:
      - intent: pregunta_general_embarazo
      - action: action_responder_pregunta_embarazo

  - rule: Usar OpenAI como fallback
    steps:
      - intent: nlu_fallback
      - action: action_openai_fallback